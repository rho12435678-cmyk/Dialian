name: Deploy Bot

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22

          script: |
            cd /root/Dialian

            git pull

            source venv/bin/activate

            export TOKEN="${{ secrets.TOKEN }}"

            if [ -f bot.pid ]; then
              OLD_PID="$(cat bot.pid)"
              if ps -p "$OLD_PID" > /dev/null 2>&1; then
                kill "$OLD_PID" || true
                sleep 3
              fi
            fi

            pkill -f "[p]ython3 dial.py" || true

            nohup /root/Dialian/venv/bin/python3 dial.py > bot.log 2>&1 < /dev/null &
            echo $! > bot.pid
